<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ESCALA • CBSLS</title>
  <meta name="theme-color" content="#b71c1c" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f2f4f7;
      --card:#ffffff;
      --text:#243447;
      --muted:#7f8c8d;
      --primary:#b71c1c;
      --primary-dark:#8e0000;
      --green:#2e7d32;
      --orange:#ff9800;
      --gray:#dfe6e9;
      --shadow:0 10px 28px rgba(0,0,0,.10);
      --radius:22px;
    }
    *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text)}
    .topbar{
      background:linear-gradient(135deg,var(--primary),#d50000);
      color:#fff;padding:26px 18px 30px;text-align:center;
      box-shadow:var(--shadow)
    }
    .topbar h1{margin:0;font-size:2rem}
    .topbar .sub{margin-top:8px;font-size:1.1rem;font-weight:700}
    .pill{
      display:inline-block;margin-top:14px;padding:12px 22px;border-radius:999px;
      background:rgba(255,255,255,.16);font-weight:700
    }
    .wrap{max-width:980px;margin:0 auto;padding:18px}
    .card{
      background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:22px;margin-bottom:18px
    }
    h2,h3{margin:0 0 14px}
    label{display:block;font-weight:700;color:var(--muted);margin-bottom:8px}
    input[type="file"], textarea, input[type="text"], input[type="password"]{
      width:100%;padding:14px;border:1px solid #d8dee4;border-radius:18px;font-size:1rem
    }
    textarea{min-height:280px;resize:vertical}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{
      width:100%;border:none;border-radius:999px;padding:16px 20px;font-size:1.05rem;
      font-weight:700;color:#fff;cursor:pointer
    }
    .btn.orange{background:var(--orange)}
    .btn.green{background:var(--green)}
    .btn.gray{background:#ecf0f1;color:#2c3e50}
    .btn.red{background:var(--primary)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .status{
      padding:12px 14px;border-radius:16px;background:#f8f9fa;border:1px solid #ebeef2;
      font-weight:700;margin:12px 0
    }
    .day-card{
      border:1px solid #ecf0f1;border-radius:18px;padding:14px;margin-bottom:12px;background:#fcfcfc
    }
    .day-title{font-size:1.08rem;font-weight:700;margin-bottom:8px;color:var(--primary-dark)}
    .func-row{
      padding:10px 12px;border-radius:14px;background:#f4f6f8;margin:8px 0
    }
    .muted{color:var(--muted)}
    .hidden{display:none !important}
    .footer-space{height:40px}
    @media (max-width:700px){.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar">
    <h1>ESCALA • CBSLS</h1>
    <div class="sub" id="periodoEscala">Escala semanal atualizada • --/--/---- a --/--/----</div>
    <div class="pill" id="statusSync">Aguardando sincronização</div>
  </header>

  <main class="wrap">
    <section class="card" id="escalaCard">
      <h2>📅 Escala atual</h2>
      <div class="status" id="resumoAtualizacao">Nenhuma escala carregada.</div>
      <div id="escalaContainer"></div>
    </section>

    <section class="card" id="adminLoginCard">
      <h2>🔐 Admin</h2>
      <div class="grid-2">
        <div>
          <label for="adminEmail">E-mail</label>
          <input type="text" id="adminEmail" placeholder="admin@escala.com" value="admin@escala.com" />
        </div>
        <div>
          <label for="adminSenha">Senha</label>
          <input type="password" id="adminSenha" placeholder="Digite a senha do admin" />
        </div>
      </div>
      <div style="margin-top:12px">
        <button class="btn red" onclick="entrarAdmin()">Entrar no modo admin</button>
      </div>
    </section>

    <section class="card hidden" id="adminPanelCard">
      <h2>📄 Importar PDF/TXT e publicar escala</h2>

      <label for="pdfFile">Selecionar arquivo da escala (.pdf ou .txt)</label>
      <input type="file" id="pdfFile" accept=".pdf,.txt,text/plain,application/pdf" />

      <div class="grid-2" style="margin-top:14px">
        <button class="btn orange" onclick="lerArquivoEscala()">Ler arquivo</button>
        <button class="btn green" onclick="publicarEscalaOnline()">Publicar escala online</button>
      </div>

      <div style="margin-top:16px">
        <label for="jsonEscalaEditor">JSON da escala para revisão</label>
        <textarea id="jsonEscalaEditor" placeholder='Cole aqui o JSON completo da escala'></textarea>
      </div>

      <div class="grid-2" style="margin-top:14px">
        <button class="btn gray" onclick="carregarModeloAtual()">Carregar modelo atual</button>
        <button class="btn gray" onclick="limparCachesManualmente()">Limpar cache deste aparelho</button>
      </div>

      <div class="grid-2" style="margin-top:14px">
        <button class="btn gray" onclick="forcarAtualizacaoTodosDispositivos()">Forçar atualização em todos dispositivos</button>
        <button class="btn gray" onclick="recarregarEscalaAgora()">Recarregar escala online agora</button>
      </div>

      <div class="status" id="statusAdmin">Modo admin ativo.</div>
    </section>

    <div class="footer-space"></div>
  </main>

  <script>
    // =============================
    // CONFIGURAÇÃO SUPABASE
    // =============================
    const SUPABASE_URL = "COLE_AQUI_SUA_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "COLE_AQUI_SUA_SUPABASE_ANON_KEY";

    const supabase = window.supabase?.createClient
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    // =============================
    // CONFIG LOCAL
    // =============================
    const ADMIN_EMAIL_PADRAO = "admin@escala.com";
    const ADMIN_SENHA_PADRAO = "123456"; // troque no seu sistema
    const STORAGE_KEYS = {
      escala: "escala_cache_v2",
      versao: "escala_cache_version_v2",
      ultimaAtualizacao: "escala_ultima_atualizacao_v2"
    };

    let adminLogado = false;
    let escalaData = null;
    let canalSync = null;

    // =============================
    // UTILIDADES
    // =============================
    function escapeHtml(valor) {
      return String(valor ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function formatarDataBR(valor) {
      if (!valor) return "--/--/----";

      if (/^\d{2}\/\d{2}\/\d{4}$/.test(valor)) return valor;

      const m = String(valor).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (m) {
        const [, ano, mes, dia] = m;
        return `${pad2(dia)}/${pad2(mes)}/${ano}`;
      }

      const d = new Date(valor);
      if (!isNaN(d.getTime())) {
        return `${pad2(d.getDate())}/${pad2(d.getMonth() + 1)}/${d.getFullYear()}`;
      }

      return String(valor);
    }

    function normalizarDataISO(valor) {
      if (!valor) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(valor)) return valor;

      let m = String(valor).match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (m) return `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;

      m = String(valor).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (m) return `${m[3]}-${m[2]}-${m[1]}`;

      return String(valor);
    }

    function gerarVersaoEscala(payload) {
      const base = JSON.stringify({
        semana_inicio: payload?.semana_inicio || "",
        semana_fim: payload?.semana_fim || "",
        atualizado_em: payload?.atualizado_em || "",
        escala: payload?.escala || []
      });
      let hash = 0;
      for (let i = 0; i < base.length; i++) {
        hash = ((hash << 5) - hash) + base.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function salvarCacheLocal(payload) {
      localStorage.setItem(STORAGE_KEYS.escala, JSON.stringify(payload));
      localStorage.setItem(STORAGE_KEYS.versao, gerarVersaoEscala(payload));
      localStorage.setItem(STORAGE_KEYS.ultimaAtualizacao, String(Date.now()));
    }

    function limparCacheLocal() {
      localStorage.removeItem(STORAGE_KEYS.escala);
      localStorage.removeItem(STORAGE_KEYS.versao);
      localStorage.removeItem(STORAGE_KEYS.ultimaAtualizacao);
    }

    async function limparCachesManualmente() {
      try {
        limparCacheLocal();
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        atualizarStatusSync("Cache local limpo neste aparelho.");
        alert("✅ Cache local limpo com sucesso.");
      } catch (e) {
        console.error(e);
        alert("Erro ao limpar cache: " + e.message);
      }
    }

    function atualizarStatusSync(texto) {
      document.getElementById("statusSync").textContent = texto;
    }

    function atualizarResumo(payload) {
      document.getElementById("periodoEscala").textContent =
        `Escala semanal atualizada • ${formatarDataBR(payload?.semana_inicio)} a ${formatarDataBR(payload?.semana_fim)}`;

      const atualizacao = payload?.atualizado_em
        ? new Date(payload.atualizado_em).toLocaleString("pt-BR")
        : "--";

      document.getElementById("resumoAtualizacao").textContent =
        `Atualizado por ${payload?.atualizado_por || "-"} em ${atualizacao}`;
    }

    function normalizarEscalaImportada(obj) {
      return {
        semana_inicio: normalizarDataISO(obj?.semana_inicio || ""),
        semana_fim: normalizarDataISO(obj?.semana_fim || ""),
        atualizado_por: obj?.atualizado_por || ADMIN_EMAIL_PADRAO,
        atualizado_em: new Date().toISOString(),
        afastamentos_html: obj?.afastamentos_html || "",
        escala: Array.isArray(obj?.escala) ? obj.escala : []
      };
    }

    function renderEscala() {
      const box = document.getElementById("escalaContainer");
      box.innerHTML = "";

      if (!escalaData || !Array.isArray(escalaData.escala) || escalaData.escala.length === 0) {
        box.innerHTML = '<div class="muted">Nenhum dia disponível na escala.</div>';
        atualizarResumo({
          semana_inicio: "",
          semana_fim: "",
          atualizado_por: "-",
          atualizado_em: null
        });
        return;
      }

      atualizarResumo(escalaData);

      escalaData.escala.forEach((dia) => {
        const card = document.createElement("div");
        card.className = "day-card";

        const funcsHtml = Array.isArray(dia?.f)
          ? dia.f.map(item => {
              const posto = escapeHtml(item?.p || item?.posto || "");
              const nome = escapeHtml(item?.n || item?.nome || "");
              const obs = escapeHtml(item?.o || item?.obs || "");
              return `
                <div class="func-row">
                  <div><strong>${posto}</strong> ${nome}</div>
                  ${obs ? `<div class="muted">${obs}</div>` : ""}
                </div>
              `;
            }).join("")
          : '<div class="muted">Sem militares cadastrados.</div>';

        card.innerHTML = `
          <div class="day-title">${escapeHtml(dia?.n || "Dia")} • ${escapeHtml(dia?.d || "")}</div>
          ${funcsHtml}
        `;
        box.appendChild(card);
      });
    }

    // =============================
    // ADMIN
    // =============================
    function entrarAdmin() {
      const email = document.getElementById("adminEmail").value.trim();
      const senha = document.getElementById("adminSenha").value.trim();

      if (email !== ADMIN_EMAIL_PADRAO || senha !== ADMIN_SENHA_PADRAO) {
        alert("Credenciais de admin inválidas.");
        return;
      }

      adminLogado = true;
      document.getElementById("adminPanelCard").classList.remove("hidden");
      document.getElementById("statusAdmin").textContent = "Modo admin ativo e pronto para publicar.";
      alert("✅ Modo admin liberado.");
    }

    // =============================
    // LEITURA DE ARQUIVO
    // =============================
    async function lerArquivoEscala() {
      const fileInput = document.getElementById("pdfFile");
      const file = fileInput.files?.[0];

      if (!file) {
        alert("Selecione um arquivo .txt ou .pdf.");
        return;
      }

      const nome = file.name.toLowerCase();

      try {
        if (nome.endsWith(".txt")) {
          const texto = await file.text();
          document.getElementById("jsonEscalaEditor").value = texto.trim();
          alert("✅ TXT carregado. Revise o JSON antes de publicar.");
          return;
        }

        if (nome.endsWith(".pdf")) {
          alert("Para PDF, converta antes para TXT/JSON estruturado. O leitor atual está pronto para publicar TXT/JSON.");
          return;
        }

        alert("Formato não suportado.");
      } catch (e) {
        console.error(e);
        alert("Erro ao ler arquivo: " + e.message);
      }
    }

    function carregarModeloAtual() {
      const modelo = escalaData || {
        semana_inicio: "",
        semana_fim: "",
        atualizado_por: ADMIN_EMAIL_PADRAO,
        atualizado_em: new Date().toISOString(),
        afastamentos_html: "",
        escala: []
      };
      document.getElementById("jsonEscalaEditor").value = JSON.stringify(modelo, null, 2);
    }

    // =============================
    // PUBLICAÇÃO ONLINE
    // =============================
    async function publicarEscalaOnline() {
      try {
        if (!adminLogado) {
          alert("Entre no modo admin primeiro.");
          return;
        }

        if (!supabase) {
          alert("Biblioteca Supabase não disponível ou configuração ausente.");
          return;
        }

        const texto = document.getElementById("jsonEscalaEditor").value.trim();
        if (!texto) {
          alert("Nenhum JSON carregado.");
          return;
        }

        let bruto;
        try {
          bruto = JSON.parse(texto);
        } catch (e) {
          alert("JSON inválido.");
          return;
        }

        const payload = normalizarEscalaImportada(bruto);

        if (!Array.isArray(payload.escala)) {
          alert("A estrutura da escala é inválida.");
          return;
        }

        const versao = gerarVersaoEscala(payload);

        const { error } = await supabase
          .from("escala_atual")
          .upsert({
            id: 1,
            semana_inicio: payload.semana_inicio,
            semana_fim: payload.semana_fim,
            atualizado_por: payload.atualizado_por,
            atualizado_em: payload.atualizado_em,
            afastamentos_html: payload.afastamentos_html,
            escala: payload.escala,
            versao: versao
          }, { onConflict: "id" });

        if (error) throw error;

        escalaData = payload;
        limparCacheLocal();
        salvarCacheLocal(payload);
        renderEscala();
        atualizarStatusSync("Escala online sincronizada");

        // dispara atualização imediata em abas/dispositivos
        notificarAtualizacaoGlobal({
          type: "ESCALA_ATUALIZADA",
          versao,
          atualizado_em: payload.atualizado_em
        });

        document.getElementById("statusAdmin").textContent = "✅ Escala publicada com sucesso.";
        alert("✅ Escala publicada com sucesso.");
      } catch (erro) {
        console.error("Erro ao publicar escala:", erro);
        alert("Erro ao publicar escala: " + erro.message);
      }
    }

    async function recarregarEscalaAgora() {
      await carregarEscalaOnline(true);
    }

    async function forcarAtualizacaoTodosDispositivos() {
      try {
        notificarAtualizacaoGlobal({
          type: "FORCAR_RELOAD",
          timestamp: Date.now()
        });

        // também grava um marcador no Supabase
        if (supabase) {
          await supabase
            .from("escala_atual")
            .update({ atualizado_em: new Date().toISOString() })
            .eq("id", 1);
        }

        alert("✅ Sinal de atualização enviado.");
      } catch (e) {
        console.error(e);
        alert("Erro ao forçar atualização: " + e.message);
      }
    }

    // =============================
    // CARGA ONLINE
    // =============================
    async function carregarEscalaOnline(forcar = false) {
      try {
        if (!supabase) {
          carregarEscalaDoCache();
          return;
        }

        const { data, error } = await supabase
          .from("escala_atual")
          .select("*")
          .eq("id", 1)
          .single();

        if (error) throw error;

        if (!data) {
          carregarEscalaDoCache();
          return;
        }

        const payload = {
          semana_inicio: data.semana_inicio || "",
          semana_fim: data.semana_fim || "",
          atualizado_por: data.atualizado_por || ADMIN_EMAIL_PADRAO,
          atualizado_em: data.atualizado_em || new Date().toISOString(),
          afastamentos_html: data.afastamentos_html || "",
          escala: Array.isArray(data.escala) ? data.escala : []
        };

        const versaoNova = data.versao || gerarVersaoEscala(payload);
        const versaoLocal = localStorage.getItem(STORAGE_KEYS.versao);

        if (forcar || versaoLocal !== versaoNova) {
          escalaData = payload;
          limparCacheLocal();
          salvarCacheLocal(payload);
          renderEscala();
          atualizarStatusSync("Escala online sincronizada");
        } else {
          carregarEscalaDoCache();
          atualizarStatusSync("Escala local atualizada");
        }
      } catch (e) {
        console.error("Erro ao carregar online:", e);
        carregarEscalaDoCache();
      }
    }

    function carregarEscalaDoCache() {
      try {
        const salvo = localStorage.getItem(STORAGE_KEYS.escala);
        if (salvo) {
          escalaData = JSON.parse(salvo);
          renderEscala();
          atualizarStatusSync("Escala carregada do cache local");
          return;
        }
      } catch (e) {
        console.error("Erro cache:", e);
      }

      escalaData = {
        semana_inicio: "",
        semana_fim: "",
        atualizado_por: "-",
        atualizado_em: null,
        escala: []
      };
      renderEscala();
      atualizarStatusSync("Sem dados locais");
    }

    // =============================
    // SINCRONIZAÇÃO ENTRE DISPOSITIVOS / ABAS
    // =============================
    function iniciarBroadcastChannel() {
      if ("BroadcastChannel" in window) {
        canalSync = new BroadcastChannel("escala_sync_channel");
        canalSync.onmessage = async (event) => {
          const msg = event?.data || {};
          if (msg.type === "ESCALA_ATUALIZADA") {
            await carregarEscalaOnline(true);
          }
          if (msg.type === "FORCAR_RELOAD") {
            await carregarEscalaOnline(true);
          }
        };
      }
    }

    function notificarAtualizacaoGlobal(msg) {
      try {
        localStorage.setItem("escala_sync_ping", JSON.stringify({
          ...msg,
          timestamp: Date.now()
        }));
      } catch (_) {}

      if (canalSync) {
        canalSync.postMessage(msg);
      }
    }

    window.addEventListener("storage", async (event) => {
      if (event.key === "escala_sync_ping" && event.newValue) {
        try {
          const msg = JSON.parse(event.newValue);
          if (msg.type === "ESCALA_ATUALIZADA" || msg.type === "FORCAR_RELOAD") {
            await carregarEscalaOnline(true);
          }
        } catch (e) {
          console.error("Erro sync storage:", e);
        }
      }
    });

    // =============================
    // REALTIME SUPABASE
    // =============================
    function iniciarRealtime() {
      if (!supabase) return;

      supabase
        .channel("public:escala_atual")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "escala_atual" },
          async () => {
            await carregarEscalaOnline(true);
          }
        )
        .subscribe((status) => {
          console.log("Realtime status:", status);
        });
    }

    // =============================
    // INICIALIZAÇÃO
    // =============================
    async function init() {
      iniciarBroadcastChannel();
      iniciarRealtime();
      await carregarEscalaOnline(false);
    }

    init();
  </script>
</body>
</html>
