<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1d4f91">
  <title>Escala PRO • CBMRS SLS</title>

  <style>
    :root {
      --primary: #1d4f91;
      --accent: #ffc107;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --radius: 16px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    /* Interface App */
    .app-header {
      background: var(--primary);
      color: white;
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .app-header h1 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

    .container { max-width: 600px; margin: 0 auto; padding: 12px; }

    /* Navegação de Datas */
    .nav-date {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      padding: 15px;
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .date-display { text-align: center; flex: 1; }
    .date-display h2 { margin: 0; font-size: 20px; color: var(--primary); }
    .date-display span { font-size: 12px; color: var(--muted); font-weight: bold; }

    button { border: none; border-radius: 12px; padding: 10px 15px; font-weight: 700; cursor: pointer; }
    .btn-nav { background: #e2e8f0; color: var(--primary); font-size: 18px; }
    .btn-today { background: var(--accent); color: #000; font-size: 11px; margin-top: 5px; padding: 4px 10px; }

    .search-input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    /* Cards de Função */
    .card-func {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--primary);
      overflow: hidden;
    }

    .card-func-header {
      padding: 10px 15px;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
      font-weight: 800;
      color: var(--primary);
      font-size: 14px;
    }

    .turno-row {
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f8fafc;
    }

    .militar-info { font-size: 16px; font-weight: 700; color: #334155; }
    .turno-tag { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 800; }

    .btn-swap { background: #fff7ed; color: #c2410c; font-size: 11px; border: 1px solid #fed7aa; }

    /* Modais */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 15px;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 20px; border-radius: var(--radius); width: 100%; max-width: 400px; }
    .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
    .btn-full { width: 100%; padding: 14px; margin-bottom: 8px; font-size: 14px; }
    .btn-save { background: var(--primary); color: white; }
    .btn-close { background: #94a3b8; color: white; }

    .info-box { background: #fff; padding: 12px; border-radius: var(--radius); margin-top: 10px; border: 1px solid #e2e8f0; }
    .info-title { font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 4px; display: block; }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 id="appTitle">CBMRS - SÃO LOURENÇO DO SUL</h1>
  </header>

  <div class="container">
    <div class="nav-date">
      <button class="btn-nav" onclick="mudarDia(-1)">❮</button>
      <div class="date-display">
        <span id="labelSemana">---</span>
        <h2 id="labelData">--/--/--</h2>
        <button class="btn-today" onclick="irHoje()">HOJE</button>
      </div>
      <button class="btn-nav" onclick="mudarDia(1)">❯</button>
    </div>

    <input type="text" id="buscaMilitar" class="search-input" placeholder="🔍 Buscar militar ou função..." oninput="render()">

    <div id="listaEscala"></div>

    <div class="info-box">
      <span class="info-title">OBSERVAÇÕES / INDISPONÍVEIS</span>
      <div id="txtObs" style="font-size: 13px;"></div>
    </div>
  </div>

  <div id="modalTroca" class="modal">
    <div class="modal-content">
      <h3 style="margin:0 0 10px 0; color:var(--primary)">Trocar Serviço</h3>
      <p id="infoTroca" style="font-size: 13px; color: var(--muted)"></p>
      <label style="font-size: 12px; font-weight: bold;">Selecione o Substituto:</label>
      <select id="selectMilitar" class="input-field"></select>
      <button class="btn-full btn-save" onclick="confirmarTroca()">Salvar Alteração</button>
      <button class="btn-full btn-close" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "escala_cbmrs_sls_v1";

    // Dados extraídos fielmente do PDF (30/03 a 05/04)
    const escalaOficial = {
      titulo: "Semana 30/03 a 05/04",
      obs: "B.I. nº 026/2026. Indisponível: SD BM TOMASCHEWSKI (FÉRIAS).",
      dias: [
        { data: "2026-03-30", diaSemana: "SEGUNDA-FEIRA", funcoes: [
          { nome: "CG", turnos: [{r:"23", m:"SD BM CAMACHO"}, {r:"41", m:"SD BM CAMACHO"}]},
          { nome: "COV", turnos: [{r:"23", m:"2º SGT BM LISCANO"}, {r:"41", m:"2º SGT BM LISCANO"}]},
          { nome: "CLD", turnos: [{r:"23", m:"SD BM ISQUIERDO"}, {r:"41", m:"SD BM ISQUIERDO"}]},
          { nome: "CLE", turnos: [{r:"23", m:"SD BM WILLIAM"}, {r:"41", m:"SD BM WILLIAM"}]},
          { nome: "COBOM", turnos: [{r:"23", m:"SD TEMP LARSSON"}, {r:"41", m:"SD BM MOTTA"}]}
        ]},
        { data: "2026-03-31", diaSemana: "TERÇA-FEIRA", funcoes: [
          { nome: "CG", turnos: [{r:"23", m:"2º SGT BM ANDERSON"}, {r:"41", m:"2º SGT BM ANDERSON"}]},
          { nome: "COV", turnos: [{r:"23", m:"SD BM MAX"}, {r:"41", m:"SD BM MAX"}]},
          { nome: "CLD", turnos: [{r:"23", m:"SD BM TOMASCHEWSKI"}, {r:"41", m:"SD BM TOMASCHEWSKI"}]},
          { nome: "CLE", turnos: [{r:"23", m:"SD BM SOARES"}, {r:"41", m:"SD BM SOARES"}]},
          { nome: "COBOM", turnos: [{r:"23", m:"SD BM BORGES"}, {r:"41", m:"SD BM CAMACHO"}]}
        ]},
        { data: "2026-04-01", diaSemana: "QUARTA-FEIRA", funcoes: [
          { nome: "CG", turnos: [{r:"23", m:"SD BM ISQUIERDO"}, {r:"41", m:"SD BM ISQUIERDO"}]},
          { nome: "COV", turnos: [{r:"23", m:"2º SGT BM VINICIUS"}, {r:"41", m:"2º SGT BM VINICIUS"}]},
          { nome: "CLD", turnos: [{r:"23", m:"SD BM MOTTA"}, {r:"41", m:"SD BM MOTTA"}]},
          { nome: "COBOM", turnos: [{r:"23", m:"SD BM MAX"}, {r:"41", m:"SD BM MAX"}]}
        ]},
        { data: "2026-04-02", diaSemana: "QUINTA-FEIRA", funcoes: [
          { nome: "CG", turnos: [{r:"23", m:"SD BM CAMACHO"}, {r:"41", m:"SD BM CAMACHO"}]},
          { nome: "COV", turnos: [{r:"23", m:"2º SGT BM LISCANO"}, {r:"41", m:"2º SGT BM LISCANO"}]},
          { nome: "CLD", turnos: [{r:"23", m:"SD BM WILLIAM"}, {r:"41", m:"SD BM WILLIAM"}]},
          { nome: "COBOM", turnos: [{r:"23", m:"SD BM BATISTA"}, {r:"41", m:"SD BM BATISTA"}]}
        ]},
        { data: "2026-04-03", diaSemana: "SEXTA-FEIRA", funcoes: [
          { nome: "CG", turnos: [{r:"23", m:"2º SGT BM ANDERSON"}, {r:"41", m:"2º SGT BM ANDERSON"}]},
          { nome: "COV", turnos: [{r:"23", m:"SD BM MAX"}, {r:"41", m:"SD BM MAX"}]},
          { nome: "CLD", turnos: [{r:"23", m:"SD BM BORGES"}, {r:"41", m:"SD BM BORGES"}]},
          { nome: "COBOM", turnos: [{r:"23", m:"SD BM SOARES"}, {r:"41", m:"SD BM SOARES"}]}
        ]},
        { data: "2026-04-04", diaSemana: "SÁBADO", funcoes: [
          { nome: "CG", turnos: [{r:"23", m:"2º SGT BM VINICIUS"}, {r:"41", m:"2º SGT BM VINICIUS"}]},
          { nome: "COV", turnos: [{r:"23", m:"SD BM PEGLOW"}, {r:"41", m:"SD BM PEGLOW"}]},
          { nome: "CLD", turnos: [{r:"23", m:"SD BM ISQUIERDO"}, {r:"41", m:"SD BM ISQUIERDO"}]},
          { nome: "COBOM", turnos: [{r:"23", m:"SD BM CAMACHO"}, {r:"41", m:"SD BM CAMACHO"}]}
        ]},
        { data: "2026-04-05", diaSemana: "DOMINGO", funcoes: [
          { nome: "CG", turnos: [{r:"23", m:"1º SGT BM BATISTA"}, {r:"41", m:"1º SGT BM BATISTA"}]},
          { nome: "COV", turnos: [{r:"23", m:"SD BM MAX"}, {r:"41", m:"SD BM MAX"}]},
          { nome: "CLD", turnos: [{r:"23", m:"SD BM MAX"}, {r:"41", m:"SD BM MAX"}]},
          { nome: "COBOM", turnos: [{r:"23", m:"SD BM BATISTA"}, {r:"41", m:"SD BM BATISTA"}]}
        ]}
      ]
    };

    const militaresFull = [
      "1º SGT BM BATISTA", "1º SGT DIEFERSON", "1º SGT BM VICENTE", "2º SGT BM ANDERSON", 
      "2º SGT BM LISCANO", "2º SGT BM VINICIUS", "SD BM BORGES", "SD BM CAMACHO", 
      "SD BM ISQUIERDO", "SD TEMP LARSSON", "SD BM MAX", "SD BM MOTTA", "SD BM PEGLOW", 
      "SD BM SOARES", "SD BM TOMASCHEWSKI", "SD BM WILLIAM"
    ].sort();

    let state = { index: 0, db: null };
    let pendente = null;

    function init() {
      const salvo = localStorage.getItem(STORAGE_KEY);
      state.db = salvo ? JSON.parse(salvo) : escalaOficial;
      
      const sel = document.getElementById('selectMilitar');
      militaresFull.forEach(m => sel.add(new Option(m, m)));
      
      irHoje();
    }

    function render() {
      const dia = state.db.dias[state.index];
      const busca = document.getElementById('buscaMilitar').value.toUpperCase();

      document.getElementById('labelSemana').textContent = dia.diaSemana;
      document.getElementById('labelData').textContent = dia.data.split('-').reverse().join('/');
      document.getElementById('txtObs').textContent = state.db.obs;

      const container = document.getElementById('listaEscala');
      container.innerHTML = "";

      dia.funcoes.forEach((f, fIdx) => {
        let turnosHtml = "";
        let match = false;

        f.turnos.forEach((t, tIdx) => {
          if (!busca || t.m m.includes(busca) || f.nome.includes(busca)) {
            match = true;
            turnosHtml += `
              <div class="turno-row">
                <div>
                  <span class="turno-tag">Turno ${t.r}</span>
                  <div class="militar-info">${t.m}</div>
                </div>
                <button class="btn-swap" onclick="abrirTroca(${fIdx}, ${tIdx})">TROCAR</button>
              </div>
            `;
          }
        });

        if (match) {
          container.innerHTML += `
            <div class="card-func">
              <div class="card-func-header">${f.nome}</div>
              ${turnosHtml}
            </div>
          `;
        }
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.db));
    }

    function mudarDia(d) {
      let n = state.index + d;
      if (n >= 0 && n < state.db.dias.length) { state.index = n; render(); }
    }

    function irHoje() {
      const hoje = new Date().toISOString().split('T')[0];
      const idx = state.db.dias.findIndex(d => d.data === hoje);
      state.index = idx !== -1 ? idx : 0;
      render();
    }

    function abrirTroca(fi, ti) {
      pendente = { fi, ti };
      const t = state.db.dias[state.index].funcoes[fi].turnos[ti];
      document.getElementById('infoTroca').textContent = `Substituir ${t.m} na função ${state.db.dias[state.index].funcoes[fi].nome}`;
      document.getElementById('modalTroca').classList.add('active');
    }

    function confirmarTroca() {
      const novo = document.getElementById('selectMilitar').value;
      state.db.dias[state.index].funcoes[pendente.fi].turnos[pendente.ti].m = novo;
      fecharModal();
      render();
    }

    function fecharModal() { document.getElementById('modalTroca').classList.remove('active'); }

    window.onload = init;
  </script>
</body>
</html>
