<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1d4f91">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Escala PRO • CBMRS</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --primary: #1d4f91;
      --accent: #ffc107;
      --text: #1f2937;
      --muted: #6b7280;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --radius: 16px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* Header Estilo App */
    .app-header {
      background: var(--primary);
      color: white;
      padding: 20px 15px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .app-header h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .app-header p { margin: 5px 0 0; font-size: 12px; opacity: 0.8; }

    .container { max-width: 600px; margin: 0 auto; padding: 15px; }

    /* Navegação de Datas */
    .date-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      padding: 15px;
      border-radius: var(--radius);
      margin-bottom: 15px;
      box-shadow: var(--shadow);
    }

    .date-info { text-align: center; flex: 1; }
    .date-info h2 { margin: 0; font-size: 18px; color: var(--primary); }
    .date-info span { font-size: 13px; color: var(--muted); font-weight: bold; }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-nav { background: #e9f1fb; color: var(--primary); font-size: 18px; }
    .btn-today { background: var(--accent); color: #000; font-size: 12px; margin-top: 5px; }

    /* Busca e Filtros */
    .search-box {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      margin-bottom: 15px;
      font-size: 16px; /* Evita zoom no iPhone */
    }

    /* Cards de Função */
    .func-card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border-left: 5px solid var(--primary);
    }

    .func-header {
      padding: 12px 15px;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      font-weight: 800;
    }

    .turno-item {
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .militar-nome { font-size: 17px; font-weight: 700; color: #333; }
    .turno-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }

    .btn-swap {
      background: #fff3cd;
      color: #856404;
      font-size: 12px;
      border: 1px solid #ffeeba;
    }

    /* Resumo e Observações */
    .info-section {
      background: #eef2f7;
      padding: 15px;
      border-radius: var(--radius);
      margin-top: 20px;
    }

    .info-title { font-weight: 800; font-size: 14px; margin-bottom: 8px; display: block; }

    /* Modais */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 450px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
    select, textarea, input[type="file"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn-block { width: 100%; margin-top: 10px; padding: 15px; }
    .btn-save { background: #198754; color: white; }
    .btn-close { background: #6c757d; color: white; }

    @media (max-width: 480px) {
      .app-header h1 { font-size: 18px; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 id="appTitle">ESCALA PRO • SLS</h1>
    <p id="weekLabel">Carregando semana...</p>
  </header>

  <div class="container">
    <div class="date-nav">
      <button class="btn-nav" onclick="mudarDia(-1)">❮</button>
      <div class="date-info">
        <span id="txtDiaSemana">---</span>
        <h2 id="txtData">--/--/--</h2>
        <button class="btn-today" onclick="irHoje()">HOJE</button>
      </div>
      <button class="btn-nav" onclick="mudarDia(1)">❯</button>
    </div>

    <input type="text" id="inputBusca" class="search-box" placeholder="🔍 Buscar militar..." oninput="renderizar()">

    <div id="listaFuncoes"></div>

    <div class="info-section">
      <span class="info-title">OBSERVAÇÕES</span>
      <div id="txtObs" style="font-size: 13px; white-space: pre-wrap;"></div>
    </div>

    <div class="info-section">
      <span class="info-title">INDISPONÍVEIS</span>
      <div id="listaIndisp" style="font-size: 13px;"></div>
    </div>

    <div style="margin-top: 20px; text-align: center;">
      <button class="btn-close" style="background: #1d4f91;" onclick="abrirImportacao()">Importar Nova Escala</button>
    </div>
  </div>

  <div id="modalTroca" class="modal">
    <div class="modal-content">
      <h3 id="modalTitulo">Trocar Serviço</h3>
      <div class="form-group">
        <label>Substituto</label>
        <select id="selectMilitar"></select>
      </div>
      <div class="form-group">
        <label>Motivo/Obs</label>
        <textarea id="obsTroca" rows="2"></textarea>
      </div>
      <button class="btn-block btn-save" onclick="salvarTroca()">Confirmar Troca</button>
      <button class="btn-block btn-close" onclick="fecharModais()">Cancelar</button>
    </div>
  </div>

  <div id="modalImport" class="modal">
    <div class="modal-content">
      <h3>Importar Escala</h3>
      <div class="form-group">
        <label>Arquivo (PDF, Imagem ou JSON)</label>
        <input type="file" id="fileInput" accept=".pdf,image/*,.json,.txt">
      </div>
      <div class="form-group">
        <label>Ou Cole o Texto</label>
        <textarea id="textAreaImport" rows="5" placeholder="Cole os dados aqui..."></textarea>
      </div>
      <p id="statusImport" style="font-size: 11px; color: var(--primary);"></p>
      <button class="btn-block btn-save" onclick="processarImportacao()">Importar Agora</button>
      <button class="btn-block btn-close" onclick="fecharModais()">Voltar</button>
    </div>
  </div>

  <script>
    // --- CONFIGURAÇÃO E DADOS INICIAIS ---
    const STORAGE_KEY = "cbmrs_escala_v1";
    let db = {
      indice: 0,
      dados: null // Será carregado do localStorage ou do objeto inicial
    };

    const militares = [
      "1 TEN MARCELO", "1 SGT DIEFERSON", "1 SGT BATISTA", "1 SGT VICENTE",
      "2 SGT ANDERSON", "2 SGT LISCANO", "2 SGT VINICIUS", "SD BORGES", 
      "SD CAMACHO", "SD ISQUIERDO", "SD LARSSON", "SD MAX", "SD MOTTA", 
      "SD PEGLOW", "SD SOARES", "SD TOMASCHEWSKI", "SD WILLIAM", "SD BATISTA"
    ].sort();

    // Dados iniciais (Baseado no seu código)
    const escalaInicial = {
      tituloSemana: "1ª Semana abril, 2026",
      observacoes: "Expediente Administrativo - 6 hs",
      indisponiveis: [{nome: "SD TOMASCHEWSKI", motivo: "FÉRIAS (03/04 a 17/04)"}],
      dias: [
        { 
          data: "2026-04-04", 
          diaSemana: "SÁBADO", 
          funcoes: [
            { nome: "CG", turnos: [{ rotulo: "12h Dia", militar: "2 SGT VINICIUS" }, { rotulo: "12h Noite", militar: "2 SGT VINICIUS" }] },
            { nome: "COV", turnos: [{ rotulo: "12h Dia", militar: "SD PEGLOW" }, { rotulo: "12h Noite", militar: "SD PEGLOW" }] },
            { nome: "COBOM", turnos: [{ rotulo: "12h Dia", militar: "SD CAMACHO" }, { rotulo: "12h Noite", militar: "SD CAMACHO" }] }
          ]
        }
        // Adicionar mais conforme necessário...
      ]
    };

    let trocaAtual = null;

    // --- FUNÇÕES DE NÚCLEO ---

    function init() {
      const salvo = localStorage.getItem(STORAGE_KEY);
      db.dados = salvo ? JSON.parse(salvo) : escalaInicial;
      
      // Popular Select de Militares
      const select = document.getElementById('selectMilitar');
      militares.forEach(m => {
        let opt = new Option(m, m);
        select.add(opt);
      });

      renderizar();
    }

    function renderizar() {
      const dia = db.dados.dias[db.indice];
      const busca = document.getElementById('inputBusca').value.toUpperCase();

      // UI Básica
      document.getElementById('weekLabel').textContent = db.dados.tituloSemana;
      document.getElementById('txtDiaSemana').textContent = dia.diaSemana;
      document.getElementById('txtData').textContent = formatarData(dia.data);
      document.getElementById('txtObs').textContent = db.dados.observacoes;

      // Lista de Funções
      const container = document.getElementById('listaFuncoes');
      container.innerHTML = "";

      dia.funcoes.forEach((func, fIdx) => {
        let mostrarCard = false;
        let htmlTurnos = "";

        func.turnos.forEach((turno, tIdx) => {
          if (!busca || (turno.militar && turno.militar.includes(busca)) || func.nome.includes(busca)) {
            mostrarCard = true;
            htmlTurnos += `
              <div class="turno-item">
                <div>
                  <div class="turno-label">${turno.rotulo}</div>
                  <div class="militar-nome">${turno.militar || '---'}</div>
                </div>
                <button class="btn-swap" onclick="abrirTroca(${fIdx}, ${tIdx})">TROCAR</button>
              </div>
            `;
          }
        });

        if (mostrarCard) {
          container.innerHTML += `
            <div class="func-card">
              <div class="func-header"><span>${func.nome}</span></div>
              ${htmlTurnos}
            </div>
          `;
        }
      });

      // Indisponíveis
      document.getElementById('listaIndisp').innerHTML = db.dados.indisponiveis
        .map(i => `• <strong>${i.nome}</strong>: ${i.motivo}`).join('<br>');

      localStorage.setItem(STORAGE_KEY, JSON.stringify(db.dados));
    }

    // --- NAVEGAÇÃO ---

    function mudarDia(dir) {
      const novo = db.indice + dir;
      if (novo >= 0 && novo < db.dados.dias.length) {
        db.indice = novo;
        renderizar();
      }
    }

    function irHoje() {
      const hoje = new Date().toISOString().split('T')[0];
      const idx = db.dados.dias.findIndex(d => d.data === hoje);
      db.indice = idx !== -1 ? idx : 0;
      renderizar();
    }

    // --- TROCAS ---

    function abrirTroca(fIdx, tIdx) {
      trocaAtual = { fIdx, tIdx };
      const turno = db.dados.dias[db.indice].funcoes[fIdx].turnos[tIdx];
      document.getElementById('modalTitulo').textContent = `Trocar: ${turno.militar}`;
      document.getElementById('modalTroca').classList.add('active');
    }

    function salvarTroca() {
      const novoMilitar = document.getElementById('selectMilitar').value;
      const obs = document.getElementById('obsTroca').value;
      
      if (trocaAtual) {
        db.dados.dias[db.indice].funcoes[trocaAtual.fIdx].turnos[trocaAtual.tIdx].militar = novoMilitar;
        fecharModais();
        renderizar();
      }
    }

    // --- IMPORTAÇÃO ---

    function abrirImportacao() {
      document.getElementById('modalImport').classList.add('active');
    }

    function fecharModais() {
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    }

    async function processarImportacao() {
      const file = document.getElementById('fileInput').files[0];
      const texto = document.getElementById('textAreaImport').value;
      const status = document.getElementById('statusImport');

      try {
        if (file && file.name.endsWith('.json')) {
          const content = await file.text();
          db.dados = JSON.parse(content);
          db.indice = 0;
          status.textContent = "Sucesso!";
          setTimeout(() => { fecharModais(); renderizar(); }, 1000);
        } else if (texto.length > 10) {
          // Lógica simplificada para texto colado
          status.textContent = "Processando texto...";
          // Aqui você pode manter sua função de extrair datas do código original
          fecharModais();
          renderizar();
        } else {
          alert("Selecione um arquivo válido ou cole o texto da escala.");
        }
      } catch (e) {
        alert("Erro na importação: " + e.message);
      }
    }

    function formatarData(iso) {
      const [y, m, d] = iso.split("-");
      return `${d}/${m}/${y}`;
    }

    function formatarData(iso) {
      const parts = iso.split("-");
      return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    window.onload = init;
  </script>
</body>
</html>
