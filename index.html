<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1d4f91">
  <title>Escala PRO • CBMRS</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    :root {
      --primary: #1d4f91;
      --accent: #ffc107;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* Layout App */
    .app-header {
      background: var(--primary);
      color: white;
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .app-header h1 { margin: 0; font-size: 18px; font-weight: 800; text-transform: uppercase; }

    .container { max-width: 600px; margin: 0 auto; padding: 12px; }

    /* Navegação */
    .nav-date {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      padding: 15px;
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .date-display { text-align: center; flex: 1; }
    .date-display h2 { margin: 0; font-size: 22px; color: var(--primary); }
    .date-display span { font-size: 12px; color: var(--muted); font-weight: bold; }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-nav { background: #e2e8f0; color: var(--primary); font-size: 18px; }
    .btn-today { background: var(--accent); color: #000; font-size: 11px; margin-top: 4px; padding: 4px 10px; }

    /* Interface de Busca */
    .search-input {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    /* Cards de Função */
    .card-func {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
      overflow: hidden;
    }

    .card-func-header {
      padding: 10px 15px;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      color: var(--primary);
    }

    .turno-row {
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f8fafc;
    }

    .militar-info { font-size: 18px; font-weight: 700; color: #334155; }
    .turno-tag { font-size: 10px; color: var(--muted); text-transform: uppercase; display: block; }

    .btn-swap { background: #fff7ed; color: #c2410c; font-size: 12px; border: 1px solid #fed7aa; }

    /* Seções de Texto */
    .info-box {
      background: #fff;
      padding: 12px;
      border-radius: var(--radius);
      margin-top: 15px;
      border: 1px solid #e2e8f0;
    }

    .info-box-title { font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 5px; display: block; }

    /* Modais */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 15px;
      z-index: 1000;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
    }

    .modal-content h3 { margin-top: 0; color: var(--primary); }

    .input-field {
      width: 100%;
      padding: 12px;
      margin: 8px 0 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .btn-full { width: 100%; padding: 14px; margin-bottom: 8px; }
    .btn-save { background: var(--primary); color: white; }
    .btn-cancel { background: #94a3b8; color: white; }

    @media (max-width: 480px) {
      .date-display h2 { font-size: 18px; }
      .militar-info { font-size: 16px; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 id="weekTitle">ESCALA CBMRS</h1>
  </header>

  <div class="container">
    <div class="nav-date">
      <button class="btn-nav" onclick="navDia(-1)">❮</button>
      <div class="date-display">
        <span id="txtDiaSemana">---</span>
        <h2 id="txtData">--/--/--</h2>
        <button class="btn-today" onclick="irParaHoje()">HOJE</button>
      </div>
      <button class="btn-nav" onclick="navDia(1)">❯</button>
    </div>

    <input type="text" id="buscaMilitar" class="search-input" placeholder="🔍 Buscar nome do militar..." oninput="renderApp()">

    <div id="listaFuncoes"></div>

    <div class="info-box">
      <span class="info-box-title">NOTAS DA SEMANA</span>
      <div id="txtObs" style="font-size: 13px; white-space: pre-wrap;"></div>
    </div>

    <div class="info-box">
      <span class="info-box-title">MILITARES INDISPONÍVEIS</span>
      <div id="txtIndisp" style="font-size: 12px;"></div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
      <button class="btn-cancel" style="font-size: 12px;" onclick="document.getElementById('modalImport').classList.add('active')">Importar Novos Dados</button>
    </div>
  </div>

  <div id="modalTroca" class="modal">
    <div class="modal-content">
      <h3>Trocar Militar</h3>
      <p id="labelTroca" style="font-size: 14px; color: var(--muted);"></p>
      <label style="font-size: 12px; font-weight: bold;">Novo Militar:</label>
      <select id="selectSubstituto" class="input-field"></select>
      <button class="btn-full btn-save" onclick="executarTroca()">Confirmar Alteração</button>
      <button class="btn-full btn-cancel" onclick="fecharModais()">Sair</button>
    </div>
  </div>

  <div id="modalImport" class="modal">
    <div class="modal-content">
      <h3>Importar Escala</h3>
      <textarea id="textoImport" class="input-field" rows="6" placeholder="Cole o texto da escala ou JSON aqui..."></textarea>
      <button class="btn-full btn-save" onclick="importarDados()">Carregar Escala</button>
      <button class="btn-full btn-cancel" onclick="fecharModais()">Cancelar</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "cbmrs_app_data_v1";
    
    // Lista de militares baseada no seu código original
    const listaMilitares = [
      "1 TEN MARCELO", "1 SGT DIEFERSON", "1 SGT BATISTA", "1 SGT VICENTE",
      "2 SGT ANDERSON", "2 SGT LISCANO", "2 SGT VINICIUS", "SD BORGES", 
      "SD CAMACHO", "SD ISQUIERDO", "SD LARSSON", "SD MAX", "SD MOTTA", 
      "SD PEGLOW", "SD SOARES", "SD TOMASCHEWSKI", "SD WILLIAM", "SD BATISTA"
    ].sort();

    let appState = {
      indice: 0,
      dados: null
    };

    let trocaPendente = null;

    function init() {
      const salvo = localStorage.getItem(STORAGE_KEY);
      if (salvo) {
        appState = JSON.parse(salvo);
      } else {
        // Fallback: carrega os dados iniciais do seu arquivo
        appState.dados = {
          tituloSemana: "1ª Semana abril, 2026",
          observacoes: "Expediente Administrativo - 6 hs",
          indisponiveis: [{nome: "SD TOMASCHEWSKI", motivo: "FÉRIAS"}],
          dias: [
            {
              data: "2026-03-30", diaSemana: "SEGUNDA-FEIRA",
              funcoes: [
                { nome: "CG", turnos: [{ rotulo: "12h Dia", militar: "SD CAMACHO" }, { rotulo: "12h Noite", militar: "SD CAMACHO" }] },
                { nome: "COV", turnos: [{ rotulo: "12h Dia", militar: "2 SGT LISCANO" }, { rotulo: "12h Noite", militar: "2 SGT LISCANO" }] }
              ]
            }
          ]
        };
      }

      // Preenche select de militares
      const select = document.getElementById('selectSubstituto');
      listaMilitares.forEach(m => select.add(new Option(m, m)));

      renderApp();
    }

    function renderApp() {
      const dia = appState.dados.dias[appState.indice];
      const busca = document.getElementById('buscaMilitar').value.toUpperCase();

      document.getElementById('weekTitle').textContent = appState.dados.tituloSemana;
      document.getElementById('txtDiaSemana').textContent = dia.diaSemana;
      document.getElementById('txtData').textContent = dia.data.split('-').reverse().join('/');
      document.getElementById('txtObs').textContent = appState.dados.observacoes;
      
      document.getElementById('txtIndisp').innerHTML = appState.dados.indisponiveis
        .map(i => `• <strong>${i.nome}</strong>: ${i.motivo}`).join('<br>');

      const container = document.getElementById('listaFuncoes');
      container.innerHTML = "";

      dia.funcoes.forEach((func, fIdx) => {
        let htmlTurnos = "";
        let temResultado = false;

        func.turnos.forEach((turno, tIdx) => {
          if (!busca || turno.militar.includes(busca) || func.nome.includes(busca)) {
            temResultado = true;
            htmlTurnos += `
              <div class="turno-row">
                <div>
                  <span class="turno-tag">${turno.rotulo}</span>
                  <div class="militar-info">${turno.militar || '---'}</div>
                </div>
                <button class="btn-swap" onclick="abrirTroca(${fIdx}, ${tIdx})">TROCAR</button>
              </div>
            `;
          }
        });

        if (temResultado) {
          container.innerHTML += `
            <div class="card-func">
              <div class="card-func-header">${func.nome}</div>
              ${htmlTurnos}
            </div>
          `;
        }
      });

      localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    }

    function navDia(dir) {
      const novo = appState.indice + dir;
      if (novo >= 0 && novo < appState.dados.dias.length) {
        appState.indice = novo;
        renderApp();
      }
    }

    function irParaHoje() {
      const hoje = new Date().toISOString().split('T')[0];
      const idx = appState.dados.dias.findIndex(d => d.data === hoje);
      appState.indice = idx !== -1 ? idx : 0;
      renderApp();
    }

    function abrirTroca(fIdx, tIdx) {
      trocaPendente = { fIdx, tIdx };
      const turno = appState.dados.dias[appState.indice].funcoes[fIdx].turnos[tIdx];
      document.getElementById('labelTroca').textContent = `Substituindo: ${turno.militar} (${turno.rotulo})`;
      document.getElementById('modalTroca').classList.add('active');
    }

    function executarTroca() {
      const novo = document.getElementById('selectSubstituto').value;
      if (trocaPendente) {
        appState.dados.dias[appState.indice].funcoes[trocaPendente.fIdx].turnos[trocaPendente.tIdx].militar = novo;
        fecharModais();
        renderApp();
      }
    }

    function importarDados() {
      try {
        const txt = document.getElementById('textoImport').value;
        const json = JSON.parse(txt);
        if (json.dias) {
          appState.dados = json;
          appState.indice = 0;
          fecharModais();
          renderApp();
        }
      } catch (e) {
        alert("Erro no formato. Certifique-se de colar o JSON completo.");
      }
    }

    function fecharModais() {
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    }

    window.onload = init;
  </script>
</body>
</html>
