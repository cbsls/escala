<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escala CBMRS • São Lourenço do Sul</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #eef3f8; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
      --primary: #c62828; --primary-dark: #8e0000; --secondary: #1d4f91;
      --shadow: 0 10px 28px rgba(15,23,42,.08); --radius: 20px;
    }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }
    .app { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
    .hero { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; border-radius: 28px; padding: 25px; text-align: center; box-shadow: var(--shadow); margin-bottom: 20px; }
    .hero h1 { margin: 0; font-size: 26px; font-weight: 900; }
    .hero .sub { font-size: 14px; opacity: 0.9; margin-top: 5px; }
    .panel { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .nav-top { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 20px; }
    .center-head { text-align: center; }
    .day-title { font-size: 24px; color: var(--secondary); font-weight: 900; margin: 0; }
    .day-date { font-size: 16px; color: var(--muted); font-weight: 700; }
    button { border: none; border-radius: 12px; padding: 10px 16px; cursor: pointer; font-weight: 800; transition: 0.2s; }
    .btn-nav { background: #dbe8f8; color: var(--secondary); }
    .grid-funcoes { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
    .func-card { border: 1px solid #e5eaf1; border-radius: 18px; overflow: hidden; background: #fff; }
    .func-head { padding: 12px 15px; background: #f8fafc; border-bottom: 1px solid #e5eaf1; display: flex; justify-content: space-between; font-weight: 900; color: var(--secondary); }
    .turnos { padding: 12px; display: grid; gap: 8px; }
    .turno { background: #fbfdff; border: 1px solid #edf2f7; border-radius: 12px; padding: 10px; }
    .turno-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .militar-nome { font-size: 18px; font-weight: 800; color: var(--primary); margin-top: 4px; }
    .box-footer { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; margin-top: 20px; }
    .box { background: #fff; border-radius: 18px; border: 1px solid #e5eaf1; padding: 15px; }
    .box-h { font-weight: 900; margin-bottom: 10px; color: var(--text); border-bottom: 2px solid var(--bg); padding-bottom: 5px; }
    .indisp-item { font-size: 13px; margin-bottom: 8px; padding-left: 10px; border-left: 3px solid #f59e0b; }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>CBMRS • 6º BBM</h1>
      <div class="sub">Pelotão São Lourenço do Sul-RS [cite: 23]</div>
      <div class="sub" id="semanaLabel">Carregando...</div>
    </header>

    <div class="panel">
      <div class="nav-top">
        <button class="btn-nav" onclick="mudarDia(-1)">← Anterior</button>
        <div class="center-head">
          <h2 class="day-title" id="diaNome"></h2>
          <div class="day-date" id="diaData"></div>
        </div>
        <button class="btn-nav" onclick="mudarDia(1)">Próximo →</button>
      </div>

      <div class="grid-funcoes" id="gridFuncoes"></div>

      <div class="box-footer">
        <div class="box">
          <div class="box-h">Observações / Expediente</div>
          <div id="obsTexto" style="font-size: 14px; line-height: 1.5;"></div>
        </div>
        <div class="box">
          <div class="box-h">Afastamentos </div>
          <div id="listaIndisp"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const escalaData = {
      titulo: "Semana: 30/03/2026 a 05/04/2026 ",
      obs: "Expediente Administrativo - 6 hs, incluir carga horária complementar CM. Responsável: 1º SGT EDI DIEFERSON[cite: 24, 30].",
      afastados: [
        { nome: "SD TOMASCHEWSKI", motivo: "FÉRIAS (03/04 a 17/04)" },
        { nome: "1º SGT VICENTE", motivo: "OP VERAO" },
        { nome: "1º SGT JASSON", motivo: "OP VERAO" }
      ],
      dias: [
        { data: "30/03", nome: "SEGUNDA-FEIRA", funcoes: [
          { f: "CG", t: [{ r: "12h Dia", m: "SD BM CAMACHO" }, { r: "12h Noite", m: "SD BM CAMACHO" }] },
          { f: "COV", t: [{ r: "12h Dia", m: "2º SGT BM LISCANO" }, { r: "12h Noite", m: "2º SGT BM LISCANO" }] },
          { f: "CLD", t: [{ r: "12h Dia", m: "SD BM ISQUIERDO" }, { r: "12h Noite", m: "SD BM ISQUIERDO" }] },
          { f: "COBOM", t: [{ r: "12h Dia", m: "SD TEMP LARSSON" }, { r: "12h Noite", m: "SD BM MOTTA" }] }
        ]},
        { data: "31/03", nome: "TERÇA-FEIRA", funcoes: [
          { f: "CG", t: [{ r: "12h Dia", m: "2º SGT BM ANDERSON" }, { r: "12h Noite", m: "2º SGT BM ANDERSON" }] },
          { f: "COV", t: [{ r: "12h Dia", m: "SD TEMP LARSSON" }, { r: "12h Noite", m: "SD TEMP LARSSON" }] },
          { f: "CLD", t: [{ r: "12h Dia", m: "SD BM TOMASCHEWSKI" }, { r: "12h Noite", m: "SD BM TOMASCHEWSKI" }] },
          { f: "COBOM", t: [{ r: "12h Dia", m: "SD BM BORGES" }, { r: "12h Noite", m: "SD BM CAMACHO" }] }
        ]},
        { data: "01/04", nome: "QUARTA-FEIRA", funcoes: [
          { f: "CG", t: [{ r: "12h Dia", m: "SD BM ISQUIERDO" }, { r: "12h Noite", m: "SD BM ISQUIERDO" }] },
          { f: "COV", t: [{ r: "12h Dia", m: "SD BM PEGLOW" }, { r: "12h Noite", m: "SD BM PEGLOW" }] },
          { f: "CLD", t: [{ r: "12h Dia", m: "SD BM MOTTA" }, { r: "12h Noite", m: "SD BM MOTTA" }] },
          { f: "COBOM", t: [{ r: "12h Dia", m: "SD BM MAX" }, { r: "12h Noite", m: "SD BM MAX" }] }
        ]}
        // Os demais dias seguem a lógica do PDF 
      ]
    };

    let diaAtivo = 0;

    function render() {
      const dia = escalaData.dias[diaAtivo];
      document.getElementById('semanaLabel').textContent = escalaData.titulo;
      document.getElementById('diaNome').textContent = dia.nome;
      document.getElementById('diaData').textContent = dia.data;
      document.getElementById('obsTexto').textContent = escalaData.obs;

      const grid = document.getElementById('gridFuncoes');
      grid.innerHTML = dia.funcoes.map(func => `
        <div class="func-card">
          <div class="func-head"><span>${func.f}</span></div>
          <div class="turnos">
            ${func.t.map(turno => `
              <div class="turno">
                <div class="turno-label">${turno.r}</div>
                <div class="militar-nome">${turno.m}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      document.getElementById('listaIndisp').innerHTML = escalaData.afastados.map(a => `
        <div class="indisp-item"><strong>${a.nome}</strong><br>${a.motivo}</div>
      `).join('');
    }

    function mudarDia(n) {
      diaAtivo = (diaAtivo + n + escalaData.dias.length) % escalaData.dias.length;
      render();
    }

    render();
  </script>
</body>
</html>
